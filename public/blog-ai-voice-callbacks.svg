<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,107,53,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,53,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,107,53,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,53,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Phone icon -->
  <g transform="translate(540, 180)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.3"/>
    <circle cx="60" cy="60" r="75" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.15"/>
    <circle cx="60" cy="60" r="95" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.08"/>
    <circle cx="60" cy="60" r="40" fill="rgba(255,107,53,0.08)" stroke="#ff6b35" stroke-width="2"/>
    <path d="M48 45c0-1.1.9-2 2-2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11l-1.27 1.27a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 72 57.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 52.12 45.18 2 2 0 0 1 48 45z" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(8, 8) scale(1.2)"/>
  </g>
  
  <!-- Sound waves -->
  <g transform="translate(660, 230)" opacity="0.6">
    <path d="M0 0 Q15 -20 0 -40" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
    <path d="M12 5 Q32 -25 12 -45" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M24 10 Q49 -30 24 -50" fill="none" stroke="#ff6b35" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>
  
  <!-- 60 sec badge -->
  <g transform="translate(480, 380)">
    <rect x="0" y="0" width="240" height="44" rx="22" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
    <text x="120" y="28" text-anchor="middle" fill="#ff6b35" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="0.1em">CALLBACK IN 60 SECONDS</text>
  </g>
  
  <!-- Decorative lines -->
  <line x1="100" y1="520" x2="500" y2="520" stroke="rgba(255,107,53,0.15)" stroke-width="1"/>
  <line x1="700" y1="520" x2="1100" y2="520" stroke="rgba(255,107,53,0.15)" stroke-width="1"/>
  <circle cx="600" cy="520" r="3" fill="#ff6b35" opacity="0.5"/>
  
  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
